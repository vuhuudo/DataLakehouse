# ============================================================
# DataLakehouse – Modern Data Stack (Conflict-safe edition)
# Reference: ClickHouse lake-ready concepts (S3-native lake + fast OLAP serving)
# Layers: INGEST -> STORAGE -> PROCESS -> SERVING -> REPORT
# ============================================================
# Usage:
#   docker compose up -d
#   docker compose down
#   docker compose logs -f <service>
# ============================================================


x-dlh-runtime: &dlh-runtime
  networks:
    - web_network
  restart: always

x-dlh-timezone: &dlh-timezone
  TZ: ${TZ:-Asia/Ho_Chi_Minh}

x-authentik-env: &authentik-env
  TZ: ${TZ:-Asia/Ho_Chi_Minh}
  AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-this-authentik-secret-key}
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
  AUTHENTIK_REDIS__HOST: ${REDIS_HOST:-dlh-redis}
  AUTHENTIK_REDIS__PORT: 6379
  AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
  AUTHENTIK_REDIS__DB: ${REDIS_AUTHENTIK_DB:-1}
  AUTHENTIK_POSTGRESQL__HOST: ${POSTGRES_HOST:-dlh-postgres}
  AUTHENTIK_POSTGRESQL__PORT: 5432
  AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-${POSTGRES_DB:-postgres}}
  AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-${POSTGRES_USER:-postgres}}
  AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}

services:
  # ==========================================================
  # LAYER 2: STORAGE
  # ==========================================================

  # PostgreSQL – central metadata/config DB for stack services
  dlh-postgres:
    <<: *dlh-runtime
    image: postgres:${POSTGRES_IMAGE_VERSION:-17-alpine}
    container_name: dlh-postgres
    env_file:
      - .env
    environment:
      <<: *dlh-timezone
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGTZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${DLH_DATA_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  # PostgreSQL bootstrap – re-sync app roles/passwords on every `docker compose up`
  # This keeps Grafana/Mage/Superset aligned even if the data volume already exists.
  postgres-bootstrap:
    <<: *dlh-runtime
    image: postgres:${POSTGRES_IMAGE_VERSION:-17-alpine}
    container_name: dlh-postgres-bootstrap
    env_file:
      - .env
    environment:
      <<: *dlh-timezone
      PGHOST: ${POSTGRES_HOST:-dlh-postgres}
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      # Custom workspace DB/user/schema (optional – bootstrap creates these when set)
      CUSTOM_DB_NAME: ${CUSTOM_DB_NAME:-}
      CUSTOM_DB_USER: ${CUSTOM_DB_USER:-}
      CUSTOM_DB_PASSWORD: ${CUSTOM_DB_PASSWORD:-}
      CUSTOM_SCHEMA: ${CUSTOM_SCHEMA:-}
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      dlh-postgres:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - /docker-entrypoint-initdb.d/000_create_app_security.sh

  # RustFS – S3-compatible object storage for Bronze/Silver/Gold
  rustfs:
    <<: *dlh-runtime
    image: rustfs/rustfs:${RUSTFS_IMAGE_VERSION:-latest}
    container_name: dlh-rustfs
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      RUSTFS_VOLUMES: ${RUSTFS_VOLUMES:-/data}
      RUSTFS_ADDRESS: ${RUSTFS_ADDRESS:-0.0.0.0:9000}
      RUSTFS_CONSOLE_ADDRESS: ${RUSTFS_CONSOLE_ADDRESS:-0.0.0.0:9001}
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ALLOWED_ORIGINS: ${RUSTFS_CORS_ALLOWED_ORIGINS:-http://localhost:29100}
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: ${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-http://localhost:29101}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    ports:
      - "${DLH_DATA_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_RUSTFS_API_PORT:-29100}:9000"
      - "${DLH_APP_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_RUSTFS_CONSOLE_PORT:-29101}:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test:
        [
          "CMD", "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 20s
      timeout: 8s
      retries: 4
      start_period: 40s

  # RustFS init – create Bronze/Silver/Gold buckets
  rustfs-init:
    image: minio/mc:${MINIO_MC_IMAGE_VERSION:-latest}
    container_name: dlh-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set rustfs http://rustfs:9000 ${RUSTFS_ACCESS_KEY} ${RUSTFS_SECRET_KEY}
        mc mb --ignore-existing rustfs/bronze
        mc mb --ignore-existing rustfs/silver
        mc mb --ignore-existing rustfs/gold
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    networks:
      - web_network
    restart: "no"

  # ClickHouse – OLAP serving layer for lake data
  clickhouse:
    <<: *dlh-runtime
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_VERSION:-latest}
    container_name: dlh-clickhouse
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    ports:
      - "${DLH_DATA_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_CLICKHOUSE_HTTP_PORT:-28123}:8123"
      - "${DLH_DATA_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_CLICKHOUSE_TCP_PORT:-29000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  # Redis – shared cache/queue backend for platform services
  dlh-redis:
    <<: *dlh-runtime
    image: redis/redis-stack:${REDIS_STACK_IMAGE_VERSION:-latest}
    container_name: dlh-redis
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    command:
      - redis-stack-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - ${REDIS_PROTECTED_MODE:-yes}
      - --appendonly
      - ${REDIS_APPENDONLY:-yes}
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-change-this-redis-password}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${DLH_REDIS_PORT:-26379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change-this-redis-password} ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redisinsight:
    <<: *dlh-runtime
    image: redis/redisinsight:${REDISINSIGHT_IMAGE_VERSION:-latest}
    container_name: dlh-redisinsight
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${DLH_REDIS_GUI_PORT:-25540}:5540"
    volumes:
      - redisinsight_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5540/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      dlh-redis:
        condition: service_healthy

  # ==========================================================
  # LAYER 3: PROCESSING
  # ==========================================================

  mage:
    <<: *dlh-runtime
    image: mageai/mageai:${MAGE_IMAGE_VERSION:-latest}
    container_name: dlh-mage
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MAGE_CODE_PATH: ${MAGE_CODE_PATH:-/home/src}
      USER_CODE_PATH: ${USER_CODE_PATH:-/home/src}
      POSTGRES_HOST: ${POSTGRES_HOST:-dlh-postgres}
      DATABASE_CONNECTION_URL: postgresql+psycopg2://${MAGE_DB_USER:-dlh_mage_user}:${MAGE_DB_PASSWORD:-change-me}@${POSTGRES_HOST:-dlh-postgres}:5432/${MAGE_DB_NAME:-dlh_mage}
      MAGE_DATABASE_CONNECTION_URL: postgresql+psycopg2://${MAGE_DB_USER:-dlh_mage_user}:${MAGE_DB_PASSWORD:-change-me}@${POSTGRES_HOST:-dlh-postgres}:5432/${MAGE_DB_NAME:-dlh_mage}
      # Mage default owner user (used when workspace has no owner yet)
      DEFAULT_OWNER_EMAIL: ${MAGE_DEFAULT_OWNER_EMAIL:-admin@admin.com}
      DEFAULT_OWNER_PASSWORD: ${MAGE_DEFAULT_OWNER_PASSWORD:-admin}
      DEFAULT_OWNER_USERNAME: ${MAGE_DEFAULT_OWNER_USERNAME:-admin}
      # Source DB for ETL extraction (uses CUSTOM_DB_* when set)
      SOURCE_DB_HOST: ${POSTGRES_HOST:-dlh-postgres}
      SOURCE_DB_PORT: "5432"
      SOURCE_DB_NAME: ${SOURCE_DB_NAME:-${POSTGRES_DB:-postgres}}
      SOURCE_DB_USER: ${SOURCE_DB_USER:-${POSTGRES_USER:-postgres}}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
      SOURCE_SCHEMA: ${SOURCE_SCHEMA:-public}
      SOURCE_TABLE: ${SOURCE_TABLE:-}
      SOURCE_TABLE_CANDIDATES: ${SOURCE_TABLE_CANDIDATES:-Demo,test_projects}
      # Custom workspace credentials forwarded to Mage pipelines
      CUSTOM_DB_NAME: ${CUSTOM_DB_NAME:-}
      CUSTOM_DB_USER: ${CUSTOM_DB_USER:-}
      CUSTOM_DB_PASSWORD: ${CUSTOM_DB_PASSWORD:-}
      CUSTOM_SCHEMA: ${CUSTOM_SCHEMA:-}
      # CSV upload watcher for non-technical users (RustFS console uploads)
      CSV_UPLOAD_BUCKET: ${CSV_UPLOAD_BUCKET:-bronze}
      CSV_UPLOAD_PREFIX: ${CSV_UPLOAD_PREFIX:-csv_upload/}
      CSV_UPLOAD_ALLOW_ANYWHERE: ${CSV_UPLOAD_ALLOW_ANYWHERE:-true}
      CSV_UPLOAD_SEPARATOR: ${CSV_UPLOAD_SEPARATOR:-,}
      CSV_UPLOAD_ENCODING: ${CSV_UPLOAD_ENCODING:-utf-8}
      CSV_UPLOAD_SCAN_LIMIT: ${CSV_UPLOAD_SCAN_LIMIT:-200}
      # RustFS endpoints for ETL blocks
      RUSTFS_ENDPOINT_URL: ${RUSTFS_ENDPOINT_URL:-http://dlh-rustfs:9000}
      RUSTFS_BRONZE_BUCKET: ${RUSTFS_BRONZE_BUCKET:-bronze}
      RUSTFS_SILVER_BUCKET: ${RUSTFS_SILVER_BUCKET:-silver}
      RUSTFS_GOLD_BUCKET: ${RUSTFS_GOLD_BUCKET:-gold}
      # ClickHouse for ETL loading
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-dlh-clickhouse}
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_TCP_PORT: "9000"
    ports:
      - "${DLH_APP_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_MAGE_PORT:-26789}:6789"
    volumes:
      - ./mage:/home/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6789/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    command: mage start

  # ==========================================================
  # LAYER 4: SERVING
  # ==========================================================

  cloudbeaver:
    <<: *dlh-runtime
    image: dbeaver/cloudbeaver:latest
    container_name: dlh-cloudbeaver
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${DLH_APP_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_CLOUDBEAVER_PORT:-28978}:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully

  # ==========================================================
  # LAYER 5: REPORTING
  # ==========================================================

  superset:
    <<: *dlh-runtime
    image: apache/superset:${SUPERSET_IMAGE_VERSION:-latest}
    container_name: dlh-superset
    user: root
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      PYTHONPATH: /app/pythonpath:/app/.venv/lib/python3.10/site-packages
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: ${SUPERSET_CONFIG_PATH:-/app/pythonpath/superset_config.py}
      SUPERSET_LOAD_EXAMPLES: "${SUPERSET_LOAD_EXAMPLES:-no}"
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME:-dlh_superset}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER:-dlh_superset_user}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD:-change-me}
      REDIS_HOST: ${REDIS_HOST:-dlh-redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
      SUPERSET_REDIS_CACHE_DB: ${SUPERSET_REDIS_CACHE_DB:-2}
      SUPERSET_REDIS_RESULTS_DB: ${SUPERSET_REDIS_RESULTS_DB:-3}
      _PIP_ADDITIONAL_REQUIREMENTS: ${SUPERSET_PIP_REQUIREMENTS:-psycopg2-binary==2.9.9 clickhouse-connect==0.8.3}
    ports:
      - "${DLH_APP_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_SUPERSET_PORT:-28088}:8088"
    volumes:
      - superset_data:/var/lib/superset
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      dlh-redis:
        condition: service_healthy
    command: >
      /bin/sh -c "
      /usr/local/bin/pip install --target /app/.venv/lib/python3.10/site-packages $${_PIP_ADDITIONAL_REQUIREMENTS} && \
      /app/.venv/bin/superset db upgrade && \
      /app/.venv/bin/superset fab create-admin --username ${SUPERSET_ADMIN_USER:-admin} --firstname Admin --lastname User --email ${SUPERSET_ADMIN_EMAIL:-admin@superset.local} --password ${SUPERSET_ADMIN_PASSWORD:-admin} || true && \
      /app/.venv/bin/superset init && \
      /app/.venv/bin/superset run -h 0.0.0.0 -p 8088 --with-threads
      "

  # ==========================================================
  # INFRA: AUTHENTICATION (Authentik)
  # ==========================================================

  authentik-server:
    <<: *dlh-runtime
    image: ghcr.io/goauthentik/server:${AUTHENTIK_IMAGE_VERSION:-2026.2.1}
    container_name: dlh-authentik-server
    env_file:
      - .env
    environment:
      <<: *authentik-env
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@authentik.local}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-admin}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
    command: server
    ports:
      - "${DLH_APP_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_AUTHENTIK_PORT:-29090}:9000"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      dlh-redis:
        condition: service_healthy

  authentik-worker:
    <<: *dlh-runtime
    image: ghcr.io/goauthentik/server:${AUTHENTIK_IMAGE_VERSION:-2026.2.1}
    container_name: dlh-authentik-worker
    env_file:
      - .env
    environment:
      <<: *authentik-env
    command: worker
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      dlh-redis:
        condition: service_healthy

  grafana:
    <<: *dlh-runtime
    image: grafana/grafana:${GRAFANA_IMAGE_VERSION:-latest}
    container_name: dlh-grafana
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${GF_DATABASE_HOST:-dlh-postgres:5432}
      GF_DATABASE_NAME: ${GRAFANA_DB_NAME:-dlh_grafana}
      GF_DATABASE_USER: ${GRAFANA_DB_USER:-dlh_grafana_user}
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD:-change-me}
      GF_INSTALL_PLUGINS: ${GF_INSTALL_PLUGINS:-grafana-piechart-panel,grafana-clickhouse-datasource}
      # Pass datasource credentials into provisioning templates
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      POSTGRES_DB: ${POSTGRES_DB:-datalakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-dlh_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "${DLH_APP_BIND_IP:-${DLH_BIND_IP:-127.0.0.1}}:${DLH_GRAFANA_PORT:-23001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully

  # ==========================================================
  # INFRA: REVERSE PROXY (replaces Traefik; Auth/RBAC removed)
  # ==========================================================

  # ----------------------------------------------------------
  # OPTIONAL: Nginx Proxy Manager
  # Uncomment this block when you need reverse proxy / SSL.
  # ----------------------------------------------------------
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: dlh-nginx-proxy-manager
    restart: always
    ports:
      - "${DLH_NPM_HTTP_PORT:-80}:80"
      - "${DLH_NPM_HTTPS_PORT:-443}:443"
      - "${DLH_NPM_ADMIN_PORT:-28081}:81"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      DB_SQLITE_FILE: /data/database.sqlite
      DISABLE_IPV6: "true"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - web_network

  # ==========================================================
  # INFRA: DOCKER MANAGEMENT (Dockhand)
  # ==========================================================
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dlh-dockhand
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${DLH_APP_BIND_IP:-127.0.0.1}:${DLH_DOCKHAND_PORT:-23000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand_data:/app/data
    networks:
      - web_network

volumes:
  postgres_data:
    driver: local
  rustfs_data:
    driver: local
  clickhouse_data:
    driver: local
  superset_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  cloudbeaver_data:
    driver: local
  authentik_media:
    driver: local
  authentik_templates:
    driver: local
  npm_data:
    driver: local
  npm_letsencrypt:
    driver: local
  dockhand_data:
    driver: local

networks:
  web_network:
    external: true
    name: web_network
