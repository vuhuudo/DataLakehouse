<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DataLakehouse — production-ready local-first Data Lakehouse stack documentation">
  <title>DataLakehouse Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #2c6fad;
      --sidebar-width: 260px;
      --sidebar-background: #f5f7fa;
      --sidebar-nav-link-color: #333;
      --sidebar-nav-link-color--active: #2c6fad;
      --base-font-size: 15px;
      --code-block-border-radius: 6px;
    }
    .markdown-section table { display: table; width: 100%; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: '🏗️ DataLakehouse',
      nameLink: '/',
      repo: 'https://github.com/vuhuudo/DataLakehouse',
      loadSidebar: true,
      autoHeader: true,
      loadNavbar: false,
      homepage: 'README.md',
      subMaxLevel: 3,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs…',
        noData: 'No results found.',
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!',
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
    };
  </script>
  <!-- docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
